# Model and Training Configuration
training:
  # Learning parameters (AGGRESSIVE for faster learning)
  learning_rate: 0.001  # Increased for much faster updates
  weight_decay: 0.00001  # Minimal regularization
  gamma: 0.98  # Slightly lower for faster credit assignment

  # Exploration (reduced due to noisy networks)
  eps_start: 0.3  # Start even lower
  eps_min: 0.01
  eps_decay: 0.99  # Faster decay

  # Training schedule (AGGRESSIVE)
  batch_size: 128  # Smaller batches for faster updates
  update_every: 1  # Update every step
  target_update_tau: 0.02  # Much faster target updates
  n_step: 5  # Longer n-step for better long-term credit

  # Prioritized Experience Replay
  per_alpha: 0.7  # Higher priority exponent for more focus on important transitions
  per_beta_start: 0.4

  # Buffer sizes
  replay_buffer_size: 50000  # Smaller buffer for faster replay of recent experiences

  # Gradient clipping
  max_grad_norm: 2.0  # Allow larger updates

model:
  # Network architecture (OPTIMIZED - increased capacity)
  hidden_size: 512  # Doubled from 256 for more learning capacity
  value_hidden: 256  # Doubled from 128
  advantage_hidden: 256  # Doubled from 128
  use_noisy_nets: true  # Enable noisy networks for exploration

  # Input/output
  n_observations: 25  # Length of OBS_KEYS
  n_actions: 7

performance:
  # Request timing
  log_every_n_steps: 50
  timing_log_every: 10
  max_stored_times: 100
  
  # CSV logging
  csv_enabled: true
  csv_filename: "training_metrics.csv"
  
optimization:
  # PyTorch optimizations
  compile_model: false  # Disabled - requires OpenMP/C++ compiler on Windows
  use_mixed_precision: false

  # Request batching (future feature)
  enable_request_batching: false
  batch_timeout_ms: 10

  # Action caching for repeated states
  enable_action_cache: false  # Disabled by default for safety
  action_cache_size: 100