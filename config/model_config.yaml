# Model and Training Configuration
training:
  # Learning parameters (OPTIMIZED for faster learning)
  learning_rate: 0.0003  # Increased from 0.001 for faster updates
  weight_decay: 0.00005  # Reduced to prevent over-regularization
  gamma: 0.99

  # Exploration (reduced due to noisy networks)
  eps_start: 0.5  # Start lower since noisy nets handle exploration
  eps_min: 0.01  # Lower minimum for more exploitation
  eps_decay: 0.995  # Faster decay

  # Training schedule (OPTIMIZED for faster learning)
  batch_size: 256  # Doubled for more stable gradients
  update_every: 1  # Update every step for faster learning
  target_update_tau: 0.01  # Faster target network updates
  n_step: 3  # Multi-step returns for better credit assignment

  # Prioritized Experience Replay
  per_alpha: 0.6  # Priority exponent
  per_beta_start: 0.4  # Importance sampling start

  # Buffer sizes
  replay_buffer_size: 200000  # Doubled for more diverse experiences

  # Gradient clipping
  max_grad_norm: 1.0  # Stricter clipping for stability

model:
  # Network architecture (OPTIMIZED - increased capacity)
  hidden_size: 512  # Doubled from 256 for more learning capacity
  value_hidden: 256  # Doubled from 128
  advantage_hidden: 256  # Doubled from 128
  use_noisy_nets: true  # Enable noisy networks for exploration

  # Input/output
  n_observations: 25  # Length of OBS_KEYS
  n_actions: 7

performance:
  # Request timing
  log_every_n_steps: 50
  timing_log_every: 10
  max_stored_times: 100
  
  # CSV logging
  csv_enabled: true
  csv_filename: "training_metrics.csv"
  
optimization:
  # PyTorch optimizations
  compile_model: false  # Disabled - requires OpenMP/C++ compiler on Windows
  use_mixed_precision: false

  # Request batching (future feature)
  enable_request_batching: false
  batch_timeout_ms: 10

  # Action caching for repeated states
  enable_action_cache: false  # Disabled by default for safety
  action_cache_size: 100