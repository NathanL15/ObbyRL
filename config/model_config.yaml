model:
  advantage_hidden: 128
  hidden_size: 256
  n_actions: 7
  n_observations: 25
  value_hidden: 128
optimization:
  action_cache_size: 100
  batch_timeout_ms: 10
  compile_model: false
  enable_action_cache: false
  enable_request_batching: false
  use_mixed_precision: false
performance:
  csv_enabled: true
  csv_filename: training_metrics.csv
  log_every_n_steps: 50
  max_stored_times: 100
  timing_log_every: 10
training:
  batch_size: 128
  elite_buffer_size: 5000
  eps_decay: 0.9970019999999999
  eps_min: 0.05
  eps_start: 1.0
  gamma: 0.99
  learning_rate: 0.001
  max_grad_norm: 10.0
  replay_buffer_size: 100000
  target_update_tau: 0.005
  update_every: 2
  weight_decay: 0.0001
