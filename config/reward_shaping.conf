# Reward Shaping Configuration
# This file contains all reward calculation parameters that can be tuned during training

[progress_rewards]
# Base rewards per step
base_reward_per_step = -0.005
progress_reward_scale = 3.0
progress_reward_cap = -2.0  # Maximum penalty for regression

# Leap and milestone bonuses
leap_threshold = 2.0  # studs improvement for leap bonus
leap_bonus = 1.0
milestone_threshold = 1.0  # stud improvement threshold for milestone
milestone_bonus = 2.0
sustained_threshold = 0.5  # studs for sustained progress bonus
sustained_bonus = 0.5

[checkpoints]
checkpoint_bonus = 20.0
completion_base_bonus = 50.0
completion_cp_bonus = 10.0  # per checkpoint completed

[penalties]
death_penalty_hazard = 15.0
death_penalty_fall = 8.0  
death_penalty_other = 10.0
stuck_penalty = 8.0

[movement_rewards]
# Heading and movement bonuses
heading_shape_scale = 0.002
horizontal_progress_scale = 0.15
jump_up_bonus = 1.0
idle_speed_threshold = 1.0
idle_penalty_per_step = 0.02

[hazards]
hazard_near_radius = 15.0
hazard_avoid_penalty = 0.02
safe_progress_threshold = 0.25

[thresholds]
# Progress tracking
backtrack_threshold = 1.0
backtrack_penalty_scale = 0.05
min_progress_eps = 0.5
stuck_steps = 200