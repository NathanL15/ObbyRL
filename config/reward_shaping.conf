# Reward Shaping Configuration
# This file contains all reward calculation parameters that can be tuned during training

[progress_rewards]
# Base rewards per step (AGGRESSIVE)
base_reward_per_step = -0.001  # Reduced penalty for exploration
progress_reward_scale = 5.0  # Much higher reward for progress
progress_reward_cap = -1.0  # Less harsh backtrack penalty

# Leap and milestone bonuses (MORE GENEROUS)
leap_threshold = 1.5  # Easier to trigger
leap_bonus = 2.0  # Doubled reward
milestone_threshold = 0.5  # More frequent milestones
milestone_bonus = 5.0  # Much higher milestone reward
sustained_threshold = 0.3  # Easier sustained progress
sustained_bonus = 1.0  # Doubled bonus

[checkpoints]
checkpoint_bonus = 50.0  # Massively increased from 20
completion_base_bonus = 100.0  # Doubled
completion_cp_bonus = 20.0  # Doubled per checkpoint

[penalties]
death_penalty_hazard = 5.0  # Reduced to encourage exploration
death_penalty_fall = 3.0  # Reduced
death_penalty_other = 4.0  # Reduced
stuck_penalty = 3.0  # Reduced

[movement_rewards]
# Heading and movement bonuses
heading_shape_scale = 0.002
horizontal_progress_scale = 0.15
jump_up_bonus = 1.0
idle_speed_threshold = 1.0
idle_penalty_per_step = 0.02

[hazards]
hazard_near_radius = 15.0
hazard_avoid_penalty = 0.02
safe_progress_threshold = 0.25

[thresholds]
# Progress tracking
backtrack_threshold = 1.0
backtrack_penalty_scale = 0.05
min_progress_eps = 0.5
stuck_steps = 200